<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <nav class="navbar">
        <img src="./images/logo.png">
        <button class ="btn">Sign Up</button>
    </nav>

    <main class="container">
        <p>Website is Under Maintenance</p>
        <h1>We're <span>Launching</span> Soon</h1>
        <div class="launching-time">
            <div>
                <p id="day">00</p>
                <span>Days</span>
            </div>
            <div>
                <p id="hours">00</p>
                <span>Hours</span>
            </div>
            <div>
                <p id="minutes">00</p>
                <span>Minutes</span>
            </div>
            <div>
                <p id="seconds">00</p>
                <span>Seconds</span>
            </div>
        </div>
        <button>Learn More<img src="./images/triangle.png" alt="play button"></button>
    </main>
    <img class="rocket" src="./images/rocket.png" alt="rocket animation"">
    <script src="script.js"></script>
</body>
</html>
